<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sarkari Sathi — Login</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg1:#eef6ff;
      --bg2:#eaf7f4;
      --card:#ffffff;
      --text:#0f172a;
      --muted:#64748b;
      --line:#e5e7eb;
      --primary:#0f766e;
      --primary2:#0ea5a1;
      --shadow: 0 18px 50px rgba(2, 6, 23, .12);
      --radius: 18px;
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: Inter, system-ui, sans-serif;
      color:var(--text);
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:32px 16px;
      background:
        radial-gradient(1200px 700px at 10% 15%, var(--bg1), transparent 55%),
        radial-gradient(1200px 700px at 90% 80%, var(--bg2), transparent 55%),
        linear-gradient(180deg, #f8fbff, #f3fbf8);
    }

    .wrap{width:min(520px, 100%);}
    .card{
      background:rgba(255,255,255,.9);
      border-radius:var(--radius);
      box-shadow: var(--shadow);
      padding:24px;
    }

    h2{margin:0 0 6px;font-size:22px;}
    .sub{margin:0 0 18px;color:var(--muted);font-size:14px;}

    label{display:block;font-size:13px;margin:12px 0 6px;font-weight:600;}

    .field{
      padding:12px;
      border:1px solid var(--line);
      border-radius:12px;
      background:white;
    }

    input{
      border:0;
      outline:none;
      width:100%;
      font-size:14px;
    }

    .btn{
      width:100%;
      margin-top:14px;
      padding:12px;
      border:0;
      border-radius:14px;
      background: linear-gradient(135deg, var(--primary), var(--primary2));
      color:white;
      font-weight:700;
      cursor:pointer;
    }

    .link{
      color:#0f766e;
      font-weight:700;
      cursor:pointer;
    }

    .hidden{display:none;}
    .footerText{text-align:center;margin-top:14px;font-size:13px;color:var(--muted);}
  </style>
</head>

<body>
  <div class="wrap">

    <!-- LOGIN CARD -->
    <div class="card" id="loginCard">
      <h2>Welcome Back</h2>
      <p class="sub">Login to continue.</p>
